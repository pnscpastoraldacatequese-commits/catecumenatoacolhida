<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itinerário RICA - Arquidiocese de Curitiba</title>
    <!-- Scripts necessários para rodar React no navegador sem build -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Ícones Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Componente de Ícone Customizado
        const Icon = ({ name, className, size = 24 }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className} style={{width: size, height: size}}></i>;
        };

        const App = () => {
            const [activeStage, setActiveStage] = useState(0);

            const stages = [
                {
                    title: "1. Pré-Catecumenato",
                    subtitle: "Tempo do Primeiro Anúncio",
                    period: "Evangelização e Primeiro Contato",
                    icon: "cross",
                    color: "bg-blue-100 border-blue-500 text-blue-800",
                    accent: "bg-blue-500",
                    description: "Momento de busca, acolhida e proclamação do Querigma. Onde a semente da fé começa a germinar através da curiosidade e do desejo de conhecer o Senhor.",
                    rite: "Rito de Admissão",
                    riteDesc: "Passagem para o Catecumenato. O candidato é marcado com o sinal da cruz.",
                    zacchaeusIcon: "user-check",
                    zacchaeusParallel: "Como Zaqueu que subiu no sicômoro para ver Jesus, o candidato busca superar os obstáculos (a 'multidão') para ter um primeiro olhar sobre o Mestre."
                },
                {
                    title: "2. Catecumenato",
                    subtitle: "Tempo de Formação Integral",
                    period: "Instrução e Vida Comunitária",
                    icon: "book-open",
                    color: "bg-green-100 border-green-500 text-green-800",
                    accent: "bg-green-500",
                    description: "Período de amadurecimento na fé, escuta da Palavra e inserção na comunidade. É o tempo de 'fazer morada' com Jesus e aprender Seus caminhos.",
                    rite: "Rito da Eleição",
                    riteDesc: "Inscrição do nome. O candidato é agora chamado de 'Eleito'.",
                    zacchaeusIcon: "home",
                    zacchaeusParallel: "Jesus diz: 'Zaqueu, desce depressa! Hoje quero ficar em tua casa'. É o tempo da convivência e do aprendizado na intimidade da casa (Igreja)."
                },
                {
                    title: "3. Purificação e Iluminação",
                    subtitle: "Tempo de Preparação Próxima",
                    period: "Geralmente durante a Quaresma",
                    icon: "flame",
                    color: "bg-purple-100 border-purple-500 text-purple-800",
                    accent: "bg-purple-500",
                    description: "Intenso retiro espiritual focado na conversão do coração. Tempo de examinar a consciência e preparar-se para o sepultamento do homem velho.",
                    rite: "Sacramentos da Iniciação",
                    riteDesc: "Batismo, Confirmação e Eucaristia na Vigília Pascal.",
                    zacchaeusIcon: "heart",
                    zacchaeusParallel: "Zaqueu declara: 'Senhor, dou a metade dos meus bens aos pobres'. A iluminação gera uma decisão concreta de mudança de vida e reparação."
                },
                {
                    title: "4. Mistagogia",
                    subtitle: "Tempo da Vivência do Mistério",
                    period: "Período Pascal",
                    icon: "sun",
                    color: "bg-yellow-100 border-yellow-600 text-yellow-900",
                    accent: "bg-yellow-600",
                    description: "Aprofundamento nos sacramentos recebidos. O novo cristão (neófito) começa a dar frutos na comunidade e no mundo.",
                    rite: "Vida Cristã Plena",
                    riteDesc: "O neófito agora vive sua missão no mundo e na Igreja.",
                    zacchaeusIcon: "sparkles",
                    zacchaeusParallel: "Jesus proclama: 'Hoje a salvação entrou nesta casa'. O mistério celebrado se torna vida quotidiana e testemunho público de alegria."
                }
            ];

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-6xl mx-auto">
                        
                        {/* Novo Cabeçalho com Logos nas Laterais */}
                        <header className="flex flex-col md:flex-row justify-between items-center mb-12 gap-6 pb-8 border-b border-gray-200">
                            {/* Logo Esquerda - Paróquia */}
                            <img 
                                src="Logo Paróquia.jpg" 
                                alt="Logo Paróquia" 
                                className="h-20 md:h-28 w-auto object-contain drop-shadow-sm"
                                onError={(e) => { e.target.src='https://via.placeholder.com/120?text=Paroquia'; }}
                            />

                            {/* Título Central */}
                            <div className="text-center flex-1 px-4">
                                <h1 className="text-3xl md:text-4xl font-bold text-gray-800 mb-2 leading-tight">
                                    Itinerário da Iniciação Cristã
                                </h1>
                                <p className="text-lg text-blue-700 italic font-semibold mb-2">
                                    Paralelo Bíblico: O Encontro de Zaqueu (Lc 19, 1-10)
                                </p>
                                <div className="flex justify-center items-center gap-2 text-sm text-gray-500 font-medium">
                                    <Icon name="map-pin" size={16} className="text-red-500" />
                                    <span>Arquidiocese de Curitiba • Catecumenato</span>
                                </div>
                            </div>

                            {/* Logo Direita - Catequese */}
                            <img 
                                src="Logo Catequese.jpg" 
                                alt="Logo Catequese" 
                                className="h-20 md:h-28 w-auto object-contain drop-shadow-sm"
                                onError={(e) => { e.target.src='https://via.placeholder.com/120?text=Catequese'; }}
                            />
                        </header>

                        {/* Linha do Tempo Desktop */}
                        <div className="hidden md:flex justify-between items-start mb-16 relative px-10">
                            <div className="absolute top-1/2 left-0 w-full h-1 bg-gray-200 -translate-y-1/2 z-0"></div>
                            {stages.map((stage, index) => (
                                <div 
                                    key={index} 
                                    className="relative z-10 flex flex-col items-center cursor-pointer group"
                                    onClick={() => setActiveStage(index)}
                                >
                                    <div className={`w-16 h-16 rounded-full flex items-center justify-center border-4 transition-all duration-300 ${activeStage === index ? `${stage.accent} text-white scale-110 shadow-lg` : 'bg-white text-gray-400 border-gray-200 hover:border-gray-300'}`}>
                                        <Icon name={stage.icon} size={32} />
                                    </div>
                                    <p className={`mt-4 font-bold text-xs text-center max-w-[120px] uppercase tracking-tighter ${activeStage === index ? 'text-gray-900 font-bold' : 'text-gray-400'}`}>
                                        {stage.title.split('. ')[1]}
                                    </p>
                                </div>
                            ))}
                        </div>

                        {/* Card Principal */}
                        <div className="rounded-2xl border-l-8 p-6 md:p-10 shadow-xl transition-all duration-500 bg-white border-gray-200">
                            <div className="flex flex-col md:flex-row md:items-center justify-between mb-8 border-b border-gray-100 pb-6">
                                <div>
                                    <span className={`px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider text-white ${stages[activeStage].accent}`}>
                                        {stages[activeStage].period}
                                    </span>
                                    <h2 className="text-2xl md:text-3xl font-bold mt-2 text-gray-800">
                                        {stages[activeStage].title}
                                    </h2>
                                    <p className="text-lg text-gray-500 italic font-medium">{stages[activeStage].subtitle}</p>
                                </div>
                                <div className={`hidden md:flex p-4 rounded-xl ${stages[activeStage].color} bg-opacity-30`}>
                                    <Icon name={stages[activeStage].icon} size={32} className={stages[activeStage].accent.replace('bg-', 'text-')} />
                                </div>
                            </div>

                            <div className="grid md:grid-cols-1 lg:grid-cols-2 gap-6">
                                <div className="bg-gray-50 p-5 rounded-xl border border-gray-200">
                                    <h3 className="flex items-center gap-2 font-bold mb-3 text-gray-800">
                                        <Icon name="info" size={18} className="text-gray-400" /> O que acontece neste tempo?
                                    </h3>
                                    <p className="leading-relaxed text-gray-700">
                                        {stages[activeStage].description}
                                    </p>
                                </div>

                                <div className={`${stages[activeStage].color} p-5 rounded-xl border border-current border-opacity-20`}>
                                    <h3 className="flex items-center gap-2 font-bold mb-3">
                                        <Icon name={stages[activeStage].zacchaeusIcon} size={20} /> O Caminho de Zaqueu
                                    </h3>
                                    <p className="leading-relaxed italic">
                                        "{stages[activeStage].zacchaeusParallel}"
                                    </p>
                                </div>

                                <div className={`lg:col-span-2 p-5 rounded-xl border-2 border-dashed flex flex-col md:flex-row items-center justify-between gap-4 transition-colors duration-300 ${stages[activeStage].accent.replace('bg-', 'border-').replace('500', '300').replace('600', '400')}`}>
                                    <div className="flex items-center gap-3">
                                        <div className={`p-2 rounded-full ${stages[activeStage].accent} text-white`}>
                                            <Icon name="chevron-right" size={20} />
                                        </div>
                                        <div>
                                            <h3 className="font-bold text-gray-800">Rito de Passagem: {stages[activeStage].rite}</h3>
                                            <p className="text-sm text-gray-600">{stages[activeStage].riteDesc}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Navegação Mobile */}
                        <div className="flex md:hidden justify-between mt-8">
                            <button 
                                onClick={() => setActiveStage(prev => Math.max(0, prev - 1))}
                                disabled={activeStage === 0}
                                className={`px-4 py-2 rounded-lg font-bold transition ${activeStage === 0 ? 'bg-gray-200 text-gray-400' : 'bg-gray-800 text-white shadow-md'}`}
                            >
                                Anterior
                            </button>
                            <button 
                                onClick={() => setActiveStage(prev => Math.min(stages.length - 1, prev + 1))}
                                disabled={activeStage === stages.length - 1}
                                className={`px-4 py-2 rounded-lg font-bold transition ${activeStage === stages.length - 1 ? 'bg-gray-200 text-gray-400' : 'bg-gray-800 text-white shadow-md'}`}
                            >
                                Próximo
                            </button>
                        </div>

                        <footer className="mt-12 text-center text-gray-500 text-sm border-t border-gray-200 pt-8 mb-8">
                            <p className="mb-2 italic">“A Iniciação Cristã não é um curso, é uma experiência de encontro.”</p>
                            <p className="font-semibold text-gray-700 uppercase tracking-wide">
                                Paróquia Nossa Senhora da Conceição • Pastoral da Catequese
                            </p>
                            <p className="text-xs mt-1">Catecumenato de Adultos • Arquidiocese de Curitiba</p>
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
</html>
